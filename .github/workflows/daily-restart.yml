name: Daily Restart

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl apps restart exiftree
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
