{% extends "base.html" %}
{% block title %}{{ city.name }}, {{ city.country }} — {{ site_title }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ city.name }}</h1>
  <p>{{ city.country }} · {{ city.continent }}</p>
</div>

<div class="image-grid" style="grid-template-columns: repeat(4, 1fr);">
  {% include "includes/image_grid_page.html" %}
</div>
{% endblock %}
