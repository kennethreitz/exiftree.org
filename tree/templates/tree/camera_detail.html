{% extends "base.html" %}
{% block title %}{{ camera.display_name }} — ExifTree{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ camera.display_name }}</h1>
  <p>{{ camera.manufacturer }}</p>
</div>

<div class="image-grid" x-data="{
  images: [],
  async init() {
    const res = await fetch('/api/cameras/{{ camera.id }}/images');
    this.images = await res.json();
  }
}">
  <template x-for="img in images" :key="img.id">
    <a :href="'/images/' + img.id + '/'" class="image-card">
      <img :src="img.thumbnail_small" :alt="img.title" x-show="img.thumbnail_small">
      <div class="overlay">
        <div class="title" x-text="img.title || 'Untitled'"></div>
        <div class="meta" x-text="'by @' + img.user"></div>
      </div>
    </a>
  </template>
  <div class="empty" x-show="images.length === 0">No images yet for this camera.</div>
</div>
{% endblock %}
