{% extends "base.html" %}
{% block title %}Import from Flickr — ExifTree{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Import from Flickr</h1>
  <p>Import your photos and sets from Flickr.</p>
</div>

<form id="import-form" style="max-width: 500px;">
  <div class="field" style="margin-bottom: 1rem;">
    <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Flickr Username</label>
    <input type="text" id="flickr-user" required placeholder="e.g. kennethreitz"
      style="width: 100%; padding: 0.5rem 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);">
  </div>
  <div class="field" style="margin-bottom: 1rem;">
    <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Flickr API Key</label>
    <input type="text" id="flickr-key" required placeholder="Get one at flickr.com/services/api/keys"
      style="width: 100%; padding: 0.5rem 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);">
    <a href="https://www.flickr.com/services/api/keys/" target="_blank" style="font-size: 0.8rem;">Get a free API key</a>
  </div>
  <div class="field" style="margin-bottom: 1rem;">
    <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Set ID (optional — leave blank for all sets)</label>
    <input type="text" id="flickr-set" placeholder="72157625234567890"
      style="width: 100%; padding: 0.5rem 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);">
  </div>
  <div class="field" style="margin-bottom: 1rem;">
    <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Max photos (0 = all)</label>
    <input type="number" id="flickr-max" value="0" min="0"
      style="width: 100px; padding: 0.5rem 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);">
  </div>
  <button type="submit" class="btn btn-primary" id="import-btn">Start Import</button>
  <p id="import-status" style="margin-top: 1rem; color: var(--text-muted); display: none;"></p>
  <p id="import-error" style="margin-top: 0.5rem; color: #f44; display: none;"></p>
</form>

<div id="import-log" style="margin-top: 2rem; display: none;">
  <h2 style="font-size: 1.1rem; margin-bottom: 0.5rem;">Import Log</h2>
  <pre id="log-output" style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; max-height: 400px; overflow-y: auto; font-size: 0.8rem; color: var(--text-muted); white-space: pre-wrap;"></pre>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('import-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('import-btn');
  var status = document.getElementById('import-status');
  var error = document.getElementById('import-error');
  var logDiv = document.getElementById('import-log');
  var logOutput = document.getElementById('log-output');
  var token = localStorage.getItem('token');

  if (!token) { window.location.href = '/login/'; return; }

  btn.disabled = true;
  btn.textContent = 'Importing...';
  status.style.display = 'block';
  status.textContent = 'Starting import...';
  error.style.display = 'none';
  logDiv.style.display = 'block';
  logOutput.textContent = '';

  try {
    var res = await fetch('/api/import/flickr', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        flickr_user: document.getElementById('flickr-user').value,
        api_key: document.getElementById('flickr-key').value,
        set_id: document.getElementById('flickr-set').value || '',
        max: parseInt(document.getElementById('flickr-max').value) || 0,
      }),
    });
    var data = await res.json();
    if (res.ok) {
      status.textContent = data.message || 'Import started! Check back soon.';
      logOutput.textContent = data.detail || 'Task dispatched to background worker.';
    } else {
      error.style.display = 'block';
      error.textContent = data.detail || 'Import failed';
    }
  } catch(err) {
    error.style.display = 'block';
    error.textContent = 'Request failed: ' + err.message;
  }

  btn.disabled = false;
  btn.textContent = 'Start Import';
});
</script>
{% endblock %}
