{% extends "base.html" %}
{% block title %}@{{ profile_user.username }} — ExifTree{% endblock %}
{% block content %}
<div class="profile-header" x-data="{
  user: null,
  async init() {
    const res = await fetch('/api/users/{{ profile_user.username }}');
    this.user = await res.json();
  }
}">
  <template x-if="user">
    <div class="profile-header">
      <img :src="user.avatar || ''" class="avatar" x-show="user.avatar">
      <div>
        <h1 x-text="'@' + user.username"></h1>
        <p class="bio" x-text="user.bio" x-show="user.bio"></p>
        <a :href="user.website" x-text="user.website" x-show="user.website" target="_blank"></a>
      </div>
    </div>
  </template>
</div>

<div class="image-grid" x-data="{
  images: [],
  async init() {
    const res = await fetch('/api/users/{{ profile_user.username }}/images');
    this.images = await res.json();
  }
}">
  <template x-for="img in images" :key="img.id">
    <a :href="'/images/' + img.id + '/'" class="image-card">
      <img :src="img.thumbnail_medium || img.thumbnail_small" :alt="img.title">
      <div class="overlay">
      </div>
    </a>
  </template>
  <div class="empty" x-show="images.length === 0">No images yet.</div>
</div>
{% endblock %}
